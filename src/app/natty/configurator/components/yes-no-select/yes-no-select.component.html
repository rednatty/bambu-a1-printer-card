<div class="select">
  <button
    class="select-button"
    [class.active]="active()"
    (click)="showOptions()"
    (mouseenter)="active.set(true)"
    (mouseleave)="active.set(false)">
    {{ selection() || placeholder() }}
    <span class="chevron">▾</span>
  </button>

  <div class="options" [class.visible]="!hidden()">
    @for (option of options; track option.key) {
      <button class="option" (click)="selectOption(option)">{{ option.key }}</button>
    }
  </div>
</div>
